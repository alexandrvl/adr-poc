name: Validate ADR Context

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-adrs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          
      - name: Validate Mermaid C4 Containers
        run: |
          python scripts/validate_mermaid_systems.py
